services:
  postgres:
    image: postgres:16-alpine
    container_name: ssp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_signals}
      POSTGRES_USER: ${POSTGRES_USER:-ssp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssp_user} -d ${POSTGRES_DB:-stock_signals}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ssp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: ssp_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "pidof", "qdrant"]
      interval: 15s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ssp_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
      - ./config:/app/config:ro
      - app_logs:/app/logs
    command: python -m app.scheduler

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ssp_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app:ro
    command: streamlit run app/dashboard/main.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  app_logs:

networks:
  default:
    name: ssp_network
